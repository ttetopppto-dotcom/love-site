<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>هدية ❤️</title>

<style>
body{
margin:0;
padding:0;
background:black;
font-family:Arial;
overflow:hidden;
color:white;
text-align:center;
}

.container{
position:relative;
z-index:2;
padding-top:80px;
}

h1{
font-size:40px;
color:#ff4d88;
}

p{
font-size:22px;
margin:20px;
}

button{
background:#ff4d88;
border:none;
padding:15px 25px;
font-size:20px;
border-radius:15px;
color:white;
cursor:pointer;
}

#message{
margin-top:25px;
font-size:26px;
display:none;
}

.hearts{
position:fixed;
width:100%;
height:100%;
top:0;
left:0;
overflow:hidden;
z-index:1;
}

.heart{
position:absolute;
color:red;
font-size:25px;
animation:fall linear infinite;
}

@keyframes fall{
0%{
transform:translateY(-10%);
opacity:1;
}
100%{
transform:translateY(110vh);
opacity:0;
}
}
</style>
</head>

<body>

<div class="hearts"></div>

<div class="container">
<h1>لأجمل شخص ❤️</h1>

<p>
عندي ليكي مفاجأة صغيرة ✨
</p>

<button onclick="showLove()">
اضغطي هنا ❤️
</button>

<div id="message">
بحبك جدًا جدًا ❤️🥺
</div>
</div>

<script>

function showLove(){
document.getElementById("message").style.display="block";
}

const heartsContainer=document.querySelector('.hearts');

for(let i=0;i<40;i++){

let heart=document.createElement('div');

heart.classList.add('heart');

heart.innerHTML='❤️';

heart.style.left=Math.random()*100+'%';

heart.style.animationDuration=
(3+Math.random()*5)+'s';

heart.style.fontSize=
(15+Math.random()*30)+'px';

heartsContainer.appendChild(heart);
}

</script>

</body>
</html>
